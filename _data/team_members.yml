- name: Peizhuo Yu
  photo:
  info: Mr. Peizhuo Yu is a PhD candidate in autonomous systems and connectivity at the University of Glasgow, starting from October 2022. Before that, he worked as a robot software engineer in China. He is currently researching how to make mobile robots navigate in human-shared environments in a safe and socially acceptable way. His research interests include optimization-based control, safety-critical control and reinforcement learning.
